<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="csrf-token" content="{{ csrf_token() }}" />
    <script>
      (function () {
        var key = "theme";
        var root = document.documentElement;
        var stored = localStorage.getItem(key);
        var theme = stored === "dark" || stored === "light" ? stored : "light";
        root.setAttribute("data-theme", theme);
        function bindToggle() {
          var btn = document.getElementById("theme-toggle");
          if (!btn) return;
          function sync() {
            var dark = root.getAttribute("data-theme") === "dark";
            btn.setAttribute("aria-pressed", dark ? "true" : "false");
            btn.setAttribute(
              "aria-label",
              dark ? "Switch to light mode" : "Switch to dark mode",
            );
          }
          sync();
          btn.addEventListener("click", function () {
            var next =
              root.getAttribute("data-theme") === "dark" ? "light" : "dark";
            root.setAttribute("data-theme", next);
            localStorage.setItem(key, next);
            sync();
          });
        }
        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", bindToggle);
        } else {
          bindToggle();
        }
      })();
    </script>
    <title>{% block title %}Pixelcade{% endblock %}</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/main.css') }}"
    />
  </head>
  <body>
    <nav class="site-nav" aria-label="Main navigation">
      {% block nav %}
      <div id="nav-cluster-player" class="nav-cluster">
        <div class="nav-start">
          <a
            href="{{ url_for('main.shell') }}"
            class="nav-brand font-display"
            data-spa-nav
            >Pixelcade</a
          >
          <ul class="nav-links">
            <li><a href="{{ url_for('main.shell') }}" data-spa-nav>Home</a></li>
            <li>
              <a href="{{ url_for('develop.index') }}" data-spa-nav>Develop</a>
            </li>
          </ul>
        </div>
      </div>
      <div class="nav-search-wrap" id="nav-game-search-wrap" hidden>
        <label class="nav-search-label visually-hidden" for="home-game-search"
          >Search games</label
        >
        <input
          type="search"
          id="home-game-search"
          class="nav-search-input"
          placeholder="Search games…"
          autocomplete="off"
          aria-controls="home-search-results home-discovery-rows"
          aria-expanded="false"
        />
      </div>
      <div class="nav-actions">
        <button
          type="button"
          class="theme-toggle"
          id="theme-toggle"
          aria-pressed="false"
          aria-label="Switch theme"
        >
          <span
            class="theme-toggle__icon theme-toggle__icon--light"
            aria-hidden="true"
            ><i data-lucide="sun"></i
          ></span>
          <span
            class="theme-toggle__icon theme-toggle__icon--dark"
            aria-hidden="true"
            ><i data-lucide="moon"></i
          ></span>
        </button>
        <div class="nav-auth-slot" id="nav-auth-slot"></div>
        <div
          class="nav-develop-user-slot"
          id="nav-develop-user-slot"
          hidden
        ></div>
        <button
          type="button"
          class="nav-daily-reward-btn"
          id="nav-daily-reward-btn"
          hidden
          aria-label="Daily reward"
        >
          <i data-lucide="gift" aria-hidden="true"></i>
        </button>
      </div>
      {% endblock %}
    </nav>
    <div
      id="daily-reward-modal-root"
      class="system-modal-root"
      aria-hidden="true"
    >
      <div
        class="system-modal__backdrop"
        data-daily-reward-dismiss
        aria-hidden="true"
      ></div>
      <div
        class="system-modal__dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="daily-reward-title"
      >
        <section class="system-modal__card daily-reward-card">
          <button
            type="button"
            class="system-modal__close"
            data-daily-reward-dismiss
            aria-label="Close dialog"
          >
            ×
          </button>
          <h2 id="daily-reward-title" class="system-modal__title font-display">
            Daily reward
          </h2>
          <div class="daily-reward-body">
            <div class="daily-reward-gift-wrap" id="daily-reward-gift-wrap">
              <i
                data-lucide="gift"
                class="daily-reward-gift-icon"
                aria-hidden="true"
              ></i>
            </div>
            <p
              id="daily-reward-message"
              class="system-modal__description daily-reward-message"
            ></p>
            <div id="daily-reward-claim-wrap" class="daily-reward-claim-wrap">
              <p class="daily-reward-pixels-label">+10 Pixels</p>
              <button
                type="button"
                id="daily-reward-claim-btn"
                class="btn btn--nav-primary daily-reward-claim-btn"
              >
                Claim Daily Reward
              </button>
            </div>
          </div>
        </section>
      </div>
    </div>
    {% block content %}{% endblock %}
    <div id="toast-root" class="toast-root" aria-live="polite"></div>
    {% block scripts %}{% endblock %}
    <script
      src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"
      crossorigin="anonymous"
    ></script>
    <script>
      if (typeof lucide !== "undefined") lucide.createIcons();
    </script>
    <script type="module">
      import { api } from "{{ url_for('static', filename='js/api.js') }}";
      import {
        applyDailyCheckinFromStorage,
        initNavDailyReward,
        refreshNavDailyRewardUI,
        setNavPixelsDisplay,
      } from "{{ url_for('static', filename='js/nav-daily-reward.js') }}";
      import { syncNavSearchVisibility } from "{{ url_for('static', filename='js/home-discovery.js') }}";

      window.currentUser = null;

      function syncNavSearchFromShell() {
        syncNavSearchVisibility();
      }
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", syncNavSearchFromShell);
      } else {
        syncNavSearchFromShell();
      }
      window.addEventListener("popstate", syncNavSearchFromShell);

      function renderNavAuthGuest(slot) {
        slot.replaceChildren();
        const login = document.createElement("a");
        login.className = "btn btn--nav-secondary";
        login.href = "{{ url_for('auth.login') }}";
        login.textContent = "Log in";
        const signup = document.createElement("a");
        signup.className = "btn btn--nav-primary";
        signup.href = "{{ url_for('auth.signup') }}";
        signup.textContent = "Sign up";
        slot.appendChild(login);
        slot.appendChild(signup);
      }

      function renderNavAuthUser(slot, user) {
        slot.replaceChildren();
        const wrap = document.createElement("div");
        wrap.className = "nav-auth-user";

        const pixelsEl = document.createElement("span");
        pixelsEl.className = "nav-pixels-balance";
        pixelsEl.id = "nav-pixels-balance";
        const px = Number(user.pixels);
        pixelsEl.textContent = `${Number.isFinite(px) ? px.toLocaleString() : "0"} Pixels`;

        const profile = document.createElement("a");
        profile.className = "btn btn--nav-secondary";
        profile.href =
          "/profile/" + encodeURIComponent(String(user.username || ""));
        profile.textContent = `@${user.username}`;

        wrap.appendChild(pixelsEl);
        wrap.appendChild(profile);
        slot.appendChild(wrap);
      }

      function updateNavFromCurrentUser() {
        var slot = document.getElementById("nav-auth-slot");
        if (!slot) return;
        var u = window.currentUser;
        applyDailyCheckinFromStorage();
        if (u && u.id != null && u.username) {
          renderNavAuthUser(slot, u);
        } else {
          renderNavAuthGuest(slot);
        }
        refreshNavDailyRewardUI();
        if (typeof lucide !== "undefined") lucide.createIcons();
      }

      async function syncCurrentUser() {
        try {
          var data = await api.get("/api/auth/me", { allowUnauthorized: true });
          if (data && data.id != null && data.username) {
            window.currentUser = data;
          } else {
            window.currentUser = null;
          }
        } catch (e) {
          window.currentUser = null;
        }
        updateNavFromCurrentUser();
        window.dispatchEvent(new CustomEvent("pixelcade-user-sync"));
      }

      window.pixelcadeSyncCurrentUser = syncCurrentUser;
      window.pixelcadeSetNavPixelsDisplay = setNavPixelsDisplay;

      initNavDailyReward();

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", syncCurrentUser);
      } else {
        syncCurrentUser();
      }
    </script>
  </body>
</html>
